# ── Jalali Lab tmux.conf ──────────────────────────────────────────────────────
# Gabriel Morozowsky  |  UCLA ECE  |  Phase retrieval + SEALS
# Prefix: Ctrl-a  (screen-style, less strain than Ctrl-b on 60% keyboards)

set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── Mouse + colours ───────────────────────────────────────────────────────────
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g escape-time 10            # fast Esc in vim
set -g focus-events on
set -g display-time 2000

# ── Window / pane index from 1 ───────────────────────────────────────────────
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on

# ── Splits (intuitive keys, open in cwd) ─────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'; unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ── Copy mode (vi bindings) ───────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom

# Colours: dark navy background, neon accents matching the notebook palette
set -g status-style                "bg=#0a0c14 fg=#8090a0"
set -g window-status-style         "bg=#0a0c14 fg=#556070"
set -g window-status-current-style "bg=#1a2050 fg=#50d8ff bold"
set -g pane-border-style           "fg=#223050"
set -g pane-active-border-style    "fg=#50d8ff"
set -g message-style               "bg=#203060 fg=#e0e8ff"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#ffa040 bold] #S #[fg=#223050]│ "

# Right: host | time | load
set -g status-right-length 60
set -g status-right "#[fg=#556070]%Y-%m-%d #[fg=#8090a0]%H:%M #[fg=#223050]│ #[fg=#ffa040]#H"

# Window titles
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
setw -g automatic-rename on

# ── Layouts for lab workflows ─────────────────────────────────────────────────
# <prefix> P  → Python/Jupyter pane on right, editor on left
bind P split-window -h -p 35 \; send-keys "jupyter lab --no-browser" Enter \; select-pane -L
# <prefix> G  → git log in bottom pane
bind G split-window -v -p 25 \; send-keys "git log --oneline --graph --decorate -20" Enter \; select-pane -U
